<!DOCTYPE html>
<!-- 이 파일의 역할: 업무 일정표 웹앱의 화면 골격(툴바 + 시트 영역 + 모달/토스트 컨테이너) -->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>업무 일정표</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 상단 툴바 (인쇄 시 숨김) -->
  <header class="appbar">
    <div class="bar-left">
      <div class="brand">📅 업무 일정표</div>
      <a href="m/index.html" target="_blank" class="chip" style="text-decoration:none;">📱 폰</a>
      <div class="nav">
        <button id="btn-prev" class="icon" title="이전 달">◀</button>
        <button id="month-label" class="month-btn" title="월 이동 / 기록 보기">2026년 5월</button>
        <button id="btn-next" class="icon" title="다음 달">▶</button>
        <button id="btn-today" class="chip">오늘</button>
        <span id="save-badge" class="badge">저장됨</span>
        <span id="sync-badge" class="badge" style="display:none;"></span>
      </div>
    </div>
    <div class="bar-right">
      <button id="btn-add" class="btn">＋ 일정</button>
      <button id="btn-shift" class="btn">🌓 교대</button>
      <button id="btn-search" class="btn">🔍 검색</button>
      <button id="btn-stats" class="btn">📊 통계</button>
      <button id="btn-settings" class="btn">⚙ 설정</button>
      <button id="btn-undo" class="btn" title="실행취소 (Ctrl+Z)">↩ 실행취소</button>
      <span class="sep"></span>
      <div class="zoom">
        <button id="btn-zout" class="icon" title="축소">−</button>
        <span id="zoom-label">100%</span>
        <button id="btn-zin" class="icon" title="확대">＋</button>
        <button id="btn-zfit" class="chip">화면맞춤</button>
      </div>
      <span class="sep"></span>
      <button id="btn-export" class="btn">⬇ 내보내기</button>
      <button id="btn-import" class="btn">⬆ 가져오기</button>
      <button id="btn-png" class="btn">🖼 PNG</button>
      <button id="btn-print" class="btn primary">🖨 인쇄·PDF</button>
    </div>
  </header>

  <!-- 시트 영역 -->
  <main id="canvas" class="canvas">
    <div id="stage" class="stage">
      <div id="sheet" class="sheet"></div>
    </div>
  </main>

  <!-- 모달 / 토스트 / 파일 입력 -->
  <div id="modal-root"></div>
  <div id="toast" class="toast"></div>
  <input id="file-input" type="file" accept="application/json,.json" hidden>

  <!-- 스크립트 (의존성 순서대로) -->
  <script src="js/store.js"></script>
  <script src="js/holidays.js"></script>
  <script src="js/compute.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/print.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
